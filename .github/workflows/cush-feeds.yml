name: Build Cush feeds

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build feeds
        run: |
          python build_bullpen.py || echo "bullpen failed"
          python build_team_k_recent.py || echo "team_k failed"
          python build_hitter_ewma.py || echo "hitter_ewma failed"
          python build_pitcher_ewma.py || echo "pitcher_ewma failed"
          python build_hand_splits.py || echo "hand_splits failed"
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "update cush feeds" || echo "no changes"
          git push
