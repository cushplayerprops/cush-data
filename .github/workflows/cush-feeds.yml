name: Build Cush feeds

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

# Only ever run one feed build at a time. A second trigger (schedule + manual, or two manual
# clicks) queues instead of running in parallel, so two runs can't collide on the git push.
concurrency:
  group: cush-feeds
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build feeds
        run: |
          python build_bullpen.py || echo "bullpen failed"
          python build_team_k_recent.py || echo "team_k failed"
          python build_team_offense_recent.py || echo "team_offense failed"
          python build_hitter_ewma.py || echo "hitter_ewma failed"
          python build_pitcher_ewma.py || echo "pitcher_ewma failed"
          python build_hand_splits.py || echo "hand_splits failed"
          python build_hitter_logs.py || echo "hitter_logs failed"
          python build_pitcher_logs.py || echo "pitcher_logs failed"
          python build_projections.py || echo "projections failed"
          python build_pitcher_proj.py || echo "pitcher_proj failed"
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "update cush feeds" || { echo "no changes"; exit 0; }
          # Resilient push: if the remote moved on, merge it in but KEEP our freshly-built feed
          # files (-s ours), then push. Retry a few times so a transient race never hard-fails.
          for i in 1 2 3 4 5; do
            git fetch origin main || true
            git merge -s ours origin/main -m "merge remote main (keep fresh feeds)" || true
            if git push origin HEAD:main; then echo "pushed on attempt $i"; exit 0; fi
            echo "push attempt $i failed; retrying..."; sleep $((5 * i))
          done
          echo "push still failing after retries"; exit 1
