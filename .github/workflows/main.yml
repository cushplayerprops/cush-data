name: HR Matrix Data Factory

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build hr_matrix.json
        run: node fetch_data.js
      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hr_matrix.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Update hr_matrix.json"
            git push
          fi
