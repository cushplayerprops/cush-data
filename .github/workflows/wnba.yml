name: Build wnba_stats

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is best-effort and drops on-the-hour (:00) jobs under load, so run
    # more often and at an odd minute for far better odds one fires on time.
    - cron: "17 11,13,15,17,19,21,23 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Build wnba_stats.json
        env:
          SCRAPEOPS_API_KEY: ${{ secrets.SCRAPEOPS_API_KEY }}
        run: python build_wnba.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wnba_stats.json
          git diff --staged --quiet || git commit -m "update wnba_stats.json"
          git push
