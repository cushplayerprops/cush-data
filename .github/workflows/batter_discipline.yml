name: Build batter_discipline

on:
  schedule:
    - cron: "20 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build batter_discipline.json
        run: python build_batter_discipline.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add batter_discipline.json
          git commit -m "update batter_discipline.json" || echo "no changes"
          git push
